name: Build Melodown

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows
        run: npm run make -- --targets @electron-forge/maker-zip --platform win32

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Melodown-Windows
          path: out/make/zip/win32/x64/*.zip

      - name: Release Windows
        uses: softprops/action-gh-release@v1
        with:
          files: out/make/zip/win32/x64/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build macOS
        run: npm run make -- --targets @electron-forge/maker-zip --platform darwin

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Melodown-macOS
          path: out/make/zip/darwin/x64/*.zip

      - name: Release macOS
        uses: softprops/action-gh-release@v1
        with:
          files: out/make/zip/darwin/x64/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
