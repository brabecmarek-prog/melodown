name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run make
      - name: List output
        run: Get-ChildItem -Recurse out/
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: melodown-windows
          path: out/make/zip/win32/x64/*.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run make -- --platform darwin
      - name: List output
        run: find out/ -type f || echo "out/ not found"
      - uses: actions/upload-artifact@v4
        with:
          name: melodown-macos
          path: out/make/zip/**/*.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: melodown-windows
          path: ./windows
      - uses: actions/download-artifact@v4
        with:
          name: melodown-macos
          path: ./macos
      - name: List files
        run: find . -type f
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/*.zip
            macos/**/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
