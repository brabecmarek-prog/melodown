name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run make
      - uses: actions/upload-artifact@v4
        with:
          name: melodown-windows
          path: out/make/zip/win32/x64/*.zip

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run make -- --platform darwin --arch arm64
      - name: List output
        run: find out/ -type f
      - uses: actions/upload-artifact@v4
        with:
          name: melodown-macos-arm64
          path: out/make/zip/darwin/arm64/*.zip

  build-macos-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run make -- --platform darwin --arch x64
      - name: List output
        run: find out/ -type f
      - uses: actions/upload-artifact@v4
        with:
          name: melodown-macos-x64
          path: out/make/zip/darwin/x64/*.zip

  release:
    needs: [build-windows, build-macos-arm64, build-macos-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: melodown-windows
          path: ./windows
      - uses: actions/download-artifact@v4
        with:
          name: melodown-macos-arm64
          path: ./macos-arm64
      - uses: actions/download-artifact@v4
        with:
          name: melodown-macos-x64
          path: ./macos-x64
      - name: List all files
        run: find . -type f
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/*.zip
            macos-arm64/*.zip
            macos-x64/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
