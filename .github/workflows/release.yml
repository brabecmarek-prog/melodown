name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run make
      - uses: actions/upload-artifact@v4
        with:
          name: melodown-windows
          path: out/make/zip/win32/x64/*.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install

      - name: Build macOS arm64 (Apple Silicon)
        run: npm run make -- --platform darwin --arch arm64

      - name: Build macOS x64 (Intel)
        run: npm run make -- --platform darwin --arch x64

      - name: Combine into universal zip
        run: |
          mkdir -p out/universal
          cp out/make/zip/darwin/arm64/*.zip out/universal/Melodown-darwin-universal-arm64.zip
          cp out/make/zip/darwin/x64/*.zip out/universal/Melodown-darwin-universal-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: melodown-macos
          path: out/universal/*.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: melodown-windows
          path: ./windows
      - uses: actions/download-artifact@v4
        with:
          name: melodown-macos
          path: ./macos
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/*.zip
            macos/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
